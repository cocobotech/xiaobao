<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>COCOBO EN В· Phonics Fun! рҹҢҹ</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<style>
:root{--sun:#ffd93d;--coral:#ff6b6b;--mint:#6bcb77;--sidebar:196px;--footer-h:36px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#0d0d2b;}

/* в”Җв”Җ LAYOUT в”Җв”Җ */
#app{display:flex;width:100vw;height:100vh;}


/* в”Җв”Җ SIDEBAR в”Җв”Җ */
#sidebar{
  width:var(--sidebar);flex-shrink:0;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  background:rgba(8,8,35,0.98);
  border-right:2px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;z-index:200;
  padding-top:0;
  padding-bottom:var(--footer-h);
}
/* Sidebar logo block */
.sb-logo-wrap{
  flex-shrink:0;
  display:flex;align-items:center;gap:9px;
  padding:14px 12px 12px;
  border-bottom:1.5px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
}
.sb-logo-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#ffd93d 0%,#ff9a3c 50%,#ff6b6b 100%);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 10px rgba(255,217,61,0.45);
  position:relative;overflow:hidden;
}
.sb-logo-icon::after{
  content:'';position:absolute;inset:0;border-radius:10px;
  background:linear-gradient(135deg,rgba(255,255,255,0.28),transparent);
}
.sb-logo-text{display:flex;flex-direction:column;line-height:1.1;}
.sb-logo-name{
  font-family:'Righteous',cursive;font-size:13px;letter-spacing:0.8px;
  background:linear-gradient(90deg,#ffd93d,#ff9a3c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sb-logo-sub{
  font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,0.32);font-weight:800;margin-top:2px;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);}
.sb-sec{padding:10px 0 3px 12px;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.28);font-weight:800;margin-top:4px;}
.sb-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 10px 7px 10px;cursor:pointer;border:none;background:none;
  color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-size:11.5px;font-weight:700;
  text-align:left;width:100%;transition:all 0.18s;line-height:1.35;
  border-left:3px solid transparent;
}
.sb-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.88);}
.sb-btn.active{background:rgba(255,217,61,0.1);color:#ffd93d;border-left-color:#ffd93d;}
.sb-n{font-size:9px;color:rgba(255,255,255,0.22);flex-shrink:0;width:15px;text-align:right;font-family:'Fredoka One',cursive;}
.sb-btn.active .sb-n{color:rgba(255,217,61,0.7);}

/* в”Җв”Җ MAIN в”Җв”Җ */
#main{flex:1;height:100vh;position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* в”Җв”Җ TOPBAR в”Җв”Җ */
#topbar{
  flex-shrink:0;height:52px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;
  background:rgba(10,10,40,0.97);backdrop-filter:blur(10px);
  border-bottom:1.5px solid rgba(255,255,255,0.07);
}
.tb-logo{font-family:'Fredoka One',cursive;font-size:15px;
  background:linear-gradient(90deg,#ffd93d,#ff6b6b,#c77dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-nav{display:flex;align-items:center;gap:9px;}
.tb-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.05);cursor:pointer;color:white;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tb-btn:hover{border-color:var(--sun);color:var(--sun);}
.tb-btn:disabled{opacity:0.18;cursor:not-allowed;}
.tb-ctr{font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,0.45);min-width:44px;text-align:center;}

/* в”Җв”Җ VIEW TOGGLE в”Җв”Җ */
.view-toggle{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.14);border-radius:9px;
  overflow:hidden;flex-shrink:0;
}
.vt-btn{
  padding:5px 9px;cursor:pointer;border:none;background:transparent;
  color:rgba(255,255,255,0.38);font-size:13px;transition:all 0.2s;
  display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;
  letter-spacing:0.5px;
}
.vt-btn:hover{color:rgba(255,255,255,0.75);}
.vt-btn.active{background:rgba(255,217,61,0.18);color:#ffd93d;}
.vt-sep{width:1px;background:rgba(255,255,255,0.1);height:22px;}

/* в”Җв”Җ DECK в”Җв”Җ */
#deck{flex:1;position:relative;overflow:hidden;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:scale(0.97) translateY(10px);}
.slide.active{opacity:1;pointer-events:all;transform:scale(1) translateY(0);transition:opacity 0.35s ease,transform 0.35s ease;}
.slide.exit{opacity:0;transform:scale(1.02) translateY(-8px);transition:opacity 0.22s ease,transform 0.22s ease;}
.slide.enter-prep{opacity:0;transform:scale(0.97) translateY(10px);transition:none!important;}

/* в”Җв”Җ CARD в”Җв”Җ */
.card{margin:8px 14px 8px;flex:1;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 14px 45px rgba(0,0,0,0.55),0 0 0 1.5px rgba(255,255,255,0.07);}
.sh{padding:13px 22px 9px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
.stag{font-family:'Fredoka One',cursive;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 11px;border-radius:20px;background:rgba(255,255,255,0.14);color:white;}
.stit{font-family:'Fredoka One',cursive;font-size:clamp(18px,2.5vw,30px);color:white;}
.sb{flex:1;overflow-y:auto;padding:6px 20px 16px;}
.sb::-webkit-scrollbar{width:3px;}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.16);border-radius:4px;}

/* в”Җв”Җ WORD GRID (grid view) в”Җв”Җ */
.wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px;margin-top:5px;}
.wc{background:rgba(255,255,255,0.11);border:2px solid rgba(255,255,255,0.17);border-radius:12px;
  padding:9px 7px;display:flex;flex-direction:column;align-items:center;cursor:pointer;
  transition:all 0.2s;animation:pop 0.32s ease backwards;text-align:center;user-select:none;}
.wc:hover{background:rgba(255,255,255,0.2);transform:translateY(-3px) scale(1.04);box-shadow:0 6px 16px rgba(0,0,0,0.3);}
.wc:active{transform:scale(0.94);}
.we{font-size:clamp(26px,3.3vw,38px);margin-bottom:3px;line-height:1.1;}
.wt{font-family:'Fredoka One',cursive;font-size:clamp(15px,1.9vw,20px);color:white;}
.wp{font-size:9.5px;color:rgba(255,255,255,0.5);margin-top:2px;font-weight:700;}
.hl{color:var(--sun);text-shadow:0 0 10px rgba(255,217,61,0.5);}

/* в”Җв”Җ SECTION LABEL в”Җв”Җ */
.sl{font-family:'Fredoka One',cursive;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.42);margin:13px 0 5px;}
.sl:first-child{margin-top:0;}

/* в”Җв”Җ SIGHT GRID в”Җв”Җ */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:6px;}
.sp{background:rgba(255,255,255,0.09);border:1.5px solid rgba(255,255,255,0.17);border-radius:50px;
  padding:6px 9px;font-family:'Fredoka One',cursive;font-size:clamp(13px,1.7vw,17px);color:white;
  text-align:center;cursor:pointer;transition:all 0.17s;animation:pop 0.28s ease backwards;}
.sp:hover{transform:scale(1.08);background:rgba(255,255,255,0.2);}

/* в”Җв”Җ BLEND GROUP в”Җв”Җ */
.bg2{margin-bottom:14px;}
.bh{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.bt{font-family:'Fredoka One',cursive;font-size:clamp(15px,2vw,21px);padding:4px 14px;border-radius:9px;
  color:white;border:2px solid rgba(255,255,255,0.22);}
.bd{font-size:12px;color:rgba(255,255,255,0.62);font-weight:700;}

/* в”Җв”Җ INFO BOX в”Җв”Җ */
.ib{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.13);border-radius:11px;
  padding:9px 13px;margin-bottom:10px;font-size:13px;color:rgba(255,255,255,0.78);line-height:1.6;}

/* в”Җв”Җ HERO в”Җв”Җ */
.hw{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:14px 26px;gap:14px;}
.hb{font-size:clamp(34px,5.5vw,68px);line-height:1;font-family:'Fredoka One',cursive;color:white;}
.hs{font-size:clamp(13px,1.9vw,18px);color:rgba(255,255,255,0.8);max-width:460px;line-height:1.6;}
.hc{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;}
.hch{padding:7px 15px;border-radius:13px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);
  font-size:12px;font-weight:800;color:white;}

/* в”Җв”Җ QUIZ в”Җв”Җ */
.qz{display:flex;flex-direction:column;align-items:center;gap:14px;padding:6px 0;}
.qw{font-family:'Fredoka One',cursive;font-size:clamp(34px,5.5vw,68px);color:white;}
.qc{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:440px;}
.qb{background:rgba(255,255,255,0.1);border:2.5px solid rgba(255,255,255,0.2);border-radius:14px;
  padding:12px 14px;font-family:'Fredoka One',cursive;font-size:clamp(14px,1.9vw,19px);color:white;
  cursor:pointer;transition:all 0.17s;text-align:center;}
.qb:hover{background:rgba(255,255,255,0.18);border-color:var(--sun);}
.qb.ok{background:rgba(107,203,119,0.28);border-color:#6bcb77;animation:pop 0.38s ease;}
.qb.no{background:rgba(255,107,107,0.22);border-color:#ff6b6b;animation:shake 0.32s ease;}
.qnx{background:linear-gradient(135deg,#ffd93d,#ff9a3c);border:none;border-radius:13px;
  padding:9px 28px;font-family:'Fredoka One',cursive;font-size:17px;color:#1a1a4e;
  cursor:pointer;transition:all 0.2s;box-shadow:0 3px 14px rgba(255,217,61,0.4);}
.qnx:hover{transform:translateY(-2px) scale(1.04);}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   2Г—2 FOCUS VIEW
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* When focus mode is active, hide normal scroll content and show focus overlay */
.slide.focus-mode .card > .sb { display:none !important; }
.slide.focus-mode .card > .sh { display:none !important; }

/* Focus overlay fills the card area */
.focus-overlay{
  display:none;
  position:absolute;inset:0;
  flex-direction:column;
  border-radius:20px;overflow:hidden;
}
.slide.focus-mode .focus-overlay{display:flex;}

/* Focus header bar вҖ” compact */
.fo-header{
  flex-shrink:0;padding:8px 14px 7px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.22);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.fo-title{font-family:'Fredoka One',cursive;font-size:clamp(13px,1.6vw,18px);color:white;}
.fo-pager{font-family:'Fredoka One',cursive;font-size:12px;color:rgba(255,255,255,0.5);}

/* в”Җв”Җ Main body: arrows flanking the grid в”Җв”Җ */
.fo-body{
  flex:1;display:flex;align-items:center;
  gap:0;padding:0;min-height:0;
}

/* Arrow buttons вҖ” now live on the sides */
.fo-arrow{
  width:44px;flex-shrink:0;height:100%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;background:transparent;
  transition:all 0.2s;
}
.fo-arrow:disabled{opacity:0.15;cursor:not-allowed;}
.fo-arrow:not(:disabled):hover .fo-arrow-inner{ transform:scale(1.12); }
.fo-arrow:not(:disabled):active .fo-arrow-inner{ transform:scale(0.9); }

.fo-arrow-inner{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.fo-arrow.prev .fo-arrow-inner{
  background:linear-gradient(135deg,rgba(255,255,255,0.13),rgba(255,255,255,0.06));
  border:2px solid rgba(255,255,255,0.22);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
}
.fo-arrow.next .fo-arrow-inner{
  background:linear-gradient(135deg,#ffd93d,#ff9a3c);
  border:2px solid rgba(255,255,255,0.25);
  box-shadow:0 3px 14px rgba(255,217,61,0.4);
}
.fo-arrow.prev:not(:disabled):hover .fo-arrow-inner{
  border-color:rgba(255,255,255,0.5);
  background:linear-gradient(135deg,rgba(255,255,255,0.22),rgba(255,255,255,0.1));
}
.fo-arrow.next:not(:disabled):hover .fo-arrow-inner{
  box-shadow:0 5px 20px rgba(255,217,61,0.65);
}
.fo-arrow svg{width:18px;height:18px;}
.fo-arrow.prev svg{stroke:rgba(255,255,255,0.8);}
.fo-arrow.next svg{stroke:#1a1a4e;}

/* 2Г—2 grid вҖ” takes remaining space, shrunk: 60% wide, ~83% tall */
.fo-grid{
  flex:1;display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:8px;
  padding:8px 4px;
  min-height:0;
  /* horizontal shrink 40%: use max-width so it doesn't stretch */
  max-width:60%;
  margin:0 auto;
  height:83%;  /* ~1/6 less than full */
  align-self:center;
}

/* Individual focus card */
.fc{
  background:rgba(255,255,255,0.09);
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:13px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.22s;text-align:center;padding:8px 6px;
  animation:fcPop 0.4s ease backwards;
  position:relative;overflow:hidden;min-height:0;
}
.fc::before{
  content:'';position:absolute;inset:0;border-radius:13px;
  background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);
  pointer-events:none;
}
.fc:hover{
  background:rgba(255,255,255,0.18);
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 6px 18px rgba(0,0,0,0.35),0 0 0 1.5px rgba(255,217,61,0.4);
  border-color:rgba(255,217,61,0.6);
}
.fc:active{transform:scale(0.96);}
.fc .fc-em{font-size:clamp(42px,5.5vw,68px);line-height:1.05;margin-bottom:5px;}
.fc .fc-word{font-family:'Fredoka One',cursive;font-size:clamp(20px,2.8vw,36px);color:white;margin-bottom:3px;line-height:1.1;}
.fc .fc-ph{font-size:11px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:0.5px;}
/* Highlight spans inside focus cards */
.fc .fc-word .hl{color:var(--sun);text-shadow:0 0 14px rgba(255,217,61,0.6);}

/* Dot indicators вҖ” sit below grid, centred */
.fo-dots-row{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  padding:5px 0 7px;
  gap:6px;
}
.fo-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.22);transition:all 0.2s;cursor:pointer;
}
.fo-dot.active{background:#ffd93d;width:16px;border-radius:4px;}
.fo-dot:hover:not(.active){background:rgba(255,255,255,0.5);}

/* Kept for back-compat but hidden вҖ” nav is now inline */
.fo-nav{display:none;}

@keyframes fcPop{from{transform:scale(0.75) translateY(12px);opacity:0}to{transform:scale(1);opacity:1}}
.fc:nth-child(1){animation-delay:.05s}
.fc:nth-child(2){animation-delay:.12s}
.fc:nth-child(3){animation-delay:.19s}
.fc:nth-child(4){animation-delay:.26s}


/* в”Җв”Җ FOOTER в”Җв”Җ */
#footer{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  height:var(--footer-h);
  display:flex;align-items:center;justify-content:center;
  background:rgba(6,6,25,0.97);
  border-top:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(12px);
}
.footer-text{
  font-size:10px;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,0.22);font-weight:800;font-family:'Nunito',sans-serif;
}
.footer-text span{color:rgba(255,217,61,0.5);}
#deck{margin-bottom:0;}
.card{margin-bottom:0;}


/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   рҹ“ұ iPhone LANDSCAPE вҖ” Mobile Responsive
   Covers: SE (667px), Standard (844px), Pro Max (932px)
   max-height:500px catches landscape on phones
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* Safe area variables for notch / Dynamic Island */
:root{
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

@media (max-height: 500px) and (orientation: landscape) {

  /* в”Җв”Җ Root adjustments в”Җв”Җ */
  :root{
    --sidebar: 0px;   /* sidebar hidden by default, toggled via overlay */
    --footer-h: 28px;
    --topbar-h: 40px;
  }

  html,body{ overflow:hidden; }

  /* в”Җв”Җ Sidebar becomes a slide-over drawer в”Җв”Җ */
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:500;
    width:180px;
    transform:translateX(-100%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    padding-top:0;
    padding-bottom: calc(var(--footer-h) + var(--safe-b));
    padding-left: var(--safe-l);
    box-shadow:4px 0 24px rgba(0,0,0,0.5);
  }
  #sidebar.open{ transform:translateX(0); }

  /* Sidebar logo smaller */
  .sb-logo-wrap{ padding:10px 10px 9px; }
  .sb-logo-icon{ width:28px;height:28px;font-size:15px; }
  .sb-logo-name{ font-size:11px; }
  .sb-logo-sub{ font-size:6.5px; }

  /* Sidebar nav items compact */
  .sb-btn{ padding:5px 8px; font-size:10.5px; }
  .sb-sec{ padding:7px 0 2px 10px; font-size:7.5px; }

// Extract word cards from a slide's HTML for focus view

function extractCards(slideIdx) {
  const slide = document.querySelectorAll('.slide')[slideIdx];

  const cards = slide.querySelectorAll('.wc');
  const result = [];
  cards.forEach(card => {

    const wt = card.querySelector('.wt');
    const wordHTML = wt ? wt.innerHTML : ''; // preserve <span class="hl"> markup

    const ph = card.querySelector('.wp')?.textContent || '';
    const oc = card.getAttribute('onclick') || '';
    const m = oc.match(/say\('([^']+)'\)/);
    const sayWord = m ? m[1] : word;
    result.push({em, wordHTML, word, ph, sayWord});
  });
  return result;
}

// QUIZ DATA
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const QD=[
  {q:'cat',em:'рҹҗұ',ans:'Short A /Дғ/',opts:['Short A /Дғ/','Long A /ДҒ/','Short E /Д•/','Short O /ЕҸ/']},
  {q:'bee',em:'рҹҗқ',ans:'Long E /Д“/ вҖ” ee',opts:['Short E /Д•/','Long E /Д“/ вҖ” ee','Long A /ДҒ/','Long I /Д«/']},
  {q:'kite',em:'рҹӘҒ',ans:'Long I вҖ” magic E',opts:['Short I /Дӯ/','Long I вҖ” magic E','Long E /Д“/','Long O /ЕҚ/']},
  {q:'ship',em:'рҹҡў',ans:'sh- digraph',opts:['sh- digraph','ch- digraph','sl- blend','Short S']},
  {q:'frog',em:'рҹҗё',ans:'fr- blend',opts:['fr- blend','fl- blend','Short F','tr- blend']},
  {q:'night',em:'рҹҢғ',ans:'Silent GH (-ight)',opts:['Silent GH (-ight)','Long I only','Short I','ng ending']},
  {q:'coin',em:'рҹӘҷ',ans:'oi diphthong',opts:['Long O /ЕҚ/','oi diphthong','Short O /ЕҸ/','ow diphthong']},
  {q:'bird',em:'рҹҗҰ',ans:'ir вҖ” Bossy R',opts:['Short I /Дӯ/','ir вҖ” Bossy R','Long I /Д«/','er вҖ” Bossy R']},
  {q:'duck',em:'рҹҰҶ',ans:'-ck ending',opts:['-ck ending','-ng ending','-nk ending','-ss ending']},
  {q:'rain',em:'рҹҢ§пёҸ',ans:'ai вҖ” Long A team',opts:['Short A /Дғ/','ai вҖ” Long A team','Long E /Д“/','ay ending']},
  {q:'star',em:'вӯҗ',ans:'st- blend + ar',opts:['Short A','st- blend + ar','ar only','str- blend']},
  {q:'think',em:'рҹ’ӯ',ans:'th- digraph',opts:['th- digraph','sh- digraph','tr- blend','wh- digraph']},
];
let qi=0,qs=0,qt=0,qa=false;
function bq(){
  const z=document.getElementById('qz'); if(!z)return;
  if(qi>=QD.length){
    z.innerHTML=`<div style="text-align:center;padding:14px;">
      <div style="font-size:52px;margin-bottom:10px;">рҹҺҠ</div>
      <div style="font-family:'Fredoka One',cursive;font-size:26px;color:white;">Quiz Complete!</div>
      <div style="font-family:'Fredoka One',cursive;font-size:20px;color:var(--sun);margin:10px 0;">Score: ${qs} / ${QD.length}</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:14px;">${qs===QD.length?'рҹҢҹ Perfect! Phonics Star!':qs>=QD.length*.75?'рҹҺү Great job!':'рҹ“ҡ Keep practicing!'}</div>
      <button class="qnx" onclick="qi=0;qs=0;qt=0;bq();">рҹ”„ Try Again!</button>
    </div>`; return;
  }
  qa=false;
  const d=QD[qi];
  const sh=[...d.opts].sort(()=>Math.random()-.5);
  z.innerHTML=`
    <div style="font-size:12px;color:rgba(255,255,255,0.48);font-family:'Fredoka One',cursive;letter-spacing:1px;">What phonics rule does this word use?</div>
    <div style="font-size:44px;">${d.em}</div>
    <div class="qw">${d.q}</div>
    <div class="qc">${sh.map(o=>`<button class="qb" onclick="aq(this,'${o.replace(/'/g,"\\'")}','${d.ans.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
    <div id="qfb" style="font-family:'Fredoka One',cursive;font-size:15px;min-height:24px;"></div>
    <button class="qnx" id="qnb" style="display:none;" onclick="qi++;bq();">Next вһЎпёҸ</button>
    <div style="font-family:'Fredoka One',cursive;font-size:15px;color:var(--sun);">вӯҗ ${qs} / ${qt}</div>`;
}
function aq(btn,c,ans){
  if(qa)return; qa=true; qt++;
  const fb=document.getElementById('qfb');
  if(c===ans){btn.classList.add('ok');fb.textContent='рҹҺү Correct!';fb.style.color='#6bcb77';qs++;}
  else{btn.classList.add('no');fb.textContent='вқҢ Answer: '+ans;fb.style.color='#ff6b6b';
    document.querySelectorAll('.qb').forEach(b=>{if(b.textContent.trim()===ans)b.classList.add('ok');});}
  const nb=document.getElementById('qnb');if(nb)nb.style.display='inline-block';
  const sc=document.getElementById('qsc');if(sc)sc.textContent=`вӯҗ ${qs} / ${qt}`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SPEECH
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function say(word){
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(word);
    u.lang='en-US';u.rate=0.8;u.pitch=1.15;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FOCUS VIEW LOGIC
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildFocusOverlay(slideIdx) {
  const slide = document.querySelectorAll('.slide')[slideIdx];
  if (!slide) return;

  // Remove existing overlay if any
  const existing = slide.querySelector('.focus-overlay');
  if (existing) existing.remove();

  const cards = extractCards(slideIdx);
  if (cards.length === 0) return; // No word cards on this slide (hero, quiz, etc.)

  // Init state
  if (!focusState[slideIdx]) focusState[slideIdx] = {page: 0};
  const state = focusState[slideIdx];

  const totalPages = Math.ceil(cards.length / 4);
  state.page = Math.min(state.page, totalPages - 1);
  const page = state.page;
  const pageCards = cards.slice(page * 4, page * 4 + 4);

  // Get slide title
  const titleEl = slide.querySelector('.stit');
  const title = titleEl ? titleEl.textContent : SS[slideIdx].nav;

  // Build overlay HTML
  const overlay = document.createElement('div');
  overlay.className = 'focus-overlay';

  // Apply gradient background (same as card)
  const cardEl = slide.querySelector('.card');
  if (cardEl) overlay.style.background = cardEl.style.background;

  // в”Җв”Җ Header
  const header = document.createElement('div');
  header.className = 'fo-header';
  header.innerHTML = `
    <div class="fo-title">${title}</div>
    <div class="fo-pager">${page + 1} / ${totalPages} &nbsp;В·&nbsp; ${cards.length} cards</div>
  `;
  overlay.appendChild(header);

  // в”Җв”Җ Body: [вҶҗ arrow] [2Г—2 grid] [вҶ’ arrow]
  const body = document.createElement('div');
  body.className = 'fo-body';

  // Prev arrow
  const prevBtn = document.createElement('button');
  prevBtn.className = 'fo-arrow prev';
  prevBtn.disabled = page === 0;
  prevBtn.innerHTML = `<div class="fo-arrow-inner"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>`;
  prevBtn.onclick = () => { focusState[slideIdx].page--; buildFocusOverlay(slideIdx); };

  // 2Г—2 grid
  const grid = document.createElement('div');
  grid.className = 'fo-grid';
  pageCards.forEach((card, i) => {
    const fc = document.createElement('div');
    fc.className = 'fc';
    fc.style.animationDelay = (i * 0.07) + 's';
    fc.onclick = () => say(card.sayWord);
    fc.innerHTML = `
      <div class="fc-em">${card.em}</div>
      <div class="fc-word">${card.wordHTML}</div>
      ${card.ph ? `<div class="fc-ph">${card.ph}</div>` : ''}
    `;
    grid.appendChild(fc);
  });

  // Next arrow
  const nextBtn = document.createElement('button');
  nextBtn.className = 'fo-arrow next';
  nextBtn.disabled = page >= totalPages - 1;
  nextBtn.innerHTML = `<div class="fo-arrow-inner"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>`;
  nextBtn.onclick = () => { focusState[slideIdx].page++; buildFocusOverlay(slideIdx); };

  body.appendChild(prevBtn);
  body.appendChild(grid);
  body.appendChild(nextBtn);
  overlay.appendChild(body);

  // в”Җв”Җ Dots row below body
  const dotsRow = document.createElement('div');
  dotsRow.className = 'fo-dots-row';
  for (let i = 0; i < totalPages; i++) {
    const dot = document.createElement('div');
    dot.className = 'fo-dot' + (i === page ? ' active' : '');
    dot.onclick = () => { focusState[slideIdx].page = i; buildFocusOverlay(slideIdx); };
    dotsRow.appendChild(dot);
  }
  overlay.appendChild(dotsRow);

  slide.querySelector('.card').appendChild(overlay);
}

function initFocusForSlide(idx) {
  const slide = document.querySelectorAll('.slide')[idx];
  if (!slide) return;
  const cards = extractCards(idx);
  if (cards.length === 0) return;
  buildFocusOverlay(idx);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER & NAV
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const deck=document.getElementById('deck');
const sbar=document.getElementById('sidebar');
const TOTAL=SS.length;
let cur=0,busy=false;

const SECS=[
  {label:'рҹҡҖ START',idx:0},
  {label:'рҹ”Ө LETTERS AвҖ“Z',idx:1},
  {label:'рҹҺө SHORT VOWELS',idx:6},
  {label:'рҹ”— BLENDS & DIGRAPHS',idx:11},
  {label:'рҹ“Ҹ LONG VOWELS',idx:13},
  {label:'рҹ‘‘ ADVANCED PATTERNS',idx:16},
  {label:'рҹ§© WORD SKILLS',idx:18},
  {label:'рҹ‘Ғ SIGHT WORDS',idx:22},
  {label:'рҹҸҶ QUIZ & FINISH',idx:24},
];

// Insert COCOBO logo at top of sidebar
const logoWrap = document.createElement('div');
logoWrap.className = 'sb-logo-wrap';
logoWrap.innerHTML = `
  <div class="sb-logo-icon">рҹҗЈ</div>
  <div class="sb-logo-text">
    <div class="sb-logo-name">COCOBO EN</div>
    <div class="sb-logo-sub">Phonics В· Reading</div>
  </div>
`;
sbar.appendChild(logoWrap);

SS.forEach((s,i)=>{
  const sec=SECS.find(x=>x.idx===i);
  if(sec){const d=document.createElement('div');d.className='sb-sec';d.textContent=sec.label;sbar.appendChild(d);}
  const btn=document.createElement('button');
  btn.className='sb-btn'+(i===0?' active':'');
  btn.dataset.i=i;
  btn.innerHTML=`<span class="sb-n">${i+1}</span>${s.nav}`;
  btn.onclick=()=>{
    goTo(i);
    if(isLandscapeMobile()){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-backdrop').classList.remove('show'); }
  };
  sbar.appendChild(btn);
  const el=document.createElement('div');
  el.className='slide'+(i===0?' active':'');
  const card=document.createElement('div');
  card.className='card';card.style.cssText=s.style;
  card.innerHTML=s.html;
  el.appendChild(card);deck.appendChild(el);
});

const ctr=document.getElementById('ctr');ctr.textContent=`1/${TOTAL}`;
document.getElementById('bp').disabled=true;

function goTo(idx){
  if(idx<0||idx>=TOTAL||busy||idx===cur)return;
  busy=true;
  const slides=deck.querySelectorAll('.slide');
  const btns=sbar.querySelectorAll('.sb-btn');
  const prev=cur;cur=idx;
  slides[prev].classList.remove('active');slides[prev].classList.add('exit');
  slides[cur].classList.add('enter-prep');slides[cur].offsetWidth;
  slides[cur].classList.remove('enter-prep');slides[cur].classList.add('active');
  // Apply focus mode class if active
  if (viewMode === 'focus') {
    slides[cur].classList.add('focus-mode');
  }
  btns.forEach((b,i)=>b.classList.toggle('active',i===cur));
  btns[cur].scrollIntoView({block:'nearest',behavior:'smooth'});
  ctr.textContent=`${cur+1}/${TOTAL}`;
  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bn').disabled=cur===TOTAL-1;
  setTimeout(()=>{
    slides[prev].classList.remove('exit');
    busy=false;
    // Build focus overlay after transition
    if (viewMode === 'focus') {
      initFocusForSlide(cur);
    }
  },350);
  if(SS[cur].id==='quiz')setTimeout(bq,150);
}
document.getElementById('bp').onclick=()=>goTo(cur-1);
document.getElementById('bn').onclick=()=>goTo(cur+1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(cur-1);
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ вҖ” Sidebar drawer + hamburger
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function isLandscapeMobile() {
  return window.innerHeight <= 500 && window.matchMedia('(orientation: landscape)').matches;
}

function updateLayoutMode() {
  const toggle = document.getElementById('sb-toggle');
  const lm = isLandscapeMobile();
  if (toggle) toggle.style.display = lm ? 'flex' : 'none';
  // If switching away from landscape, ensure sidebar is visible & not transformed
  const sidebar = document.getElementById('sidebar');
  if (!lm) {
    sidebar.classList.remove('open');
    document.getElementById('sb-backdrop').classList.remove('show');
    sidebar.style.position = '';
    sidebar.style.transform = '';
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sb-backdrop');
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  backdrop.classList.toggle('show', !isOpen);
}

// Auto-close sidebar when navigating in landscape
const _origGoTo = goTo;
// Patch goTo to also close sidebar on mobile
document.getElementById('bp').addEventListener('click', () => { if(isLandscapeMobile()) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-backdrop').classList.remove('show'); }});
document.getElementById('bn').addEventListener('click', () => { if(isLandscapeMobile()) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-backdrop').classList.remove('show'); }});

// Touch swipe-right to open, swipe-left to close sidebar
let _tx0 = 0, _ty0 = 0;
document.addEventListener('touchstart', e => { _tx0 = e.touches[0].clientX; _ty0 = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!isLandscapeMobile()) return;
  const dx = e.changedTouches[0].clientX - _tx0;
  const dy = e.changedTouches[0].clientY - _ty0;
  if (Math.abs(dx) < Math.abs(dy) * 1.5) return; // mostly vertical, ignore
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sb-backdrop');
  if (dx > 50 && _tx0 < 30) { sidebar.classList.add('open'); backdrop.classList.add('show'); }  // swipe right from edge
  if (dx < -50 && sidebar.classList.contains('open')) { sidebar.classList.remove('open'); backdrop.classList.remove('show'); } // swipe left to close
}, {passive:true});

// Init & re-check on resize / orientation change
window.addEventListener('resize', updateLayoutMode);
window.addEventListener('orientationchange', () => setTimeout(updateLayoutMode, 200));
updateLayoutMode();

</script>
